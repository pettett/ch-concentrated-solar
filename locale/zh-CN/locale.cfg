[mod-setting-description]
ch-enable-beams=显示镜子和塔之间的视觉光束。可能需要最多60秒才能更新。
ch-solar-max-production-mw=单个塔在满负荷时的最大加热功率输出。默认 600
ch-solar-max-temp=塔可达到的最大太阳能强度。默认 3650
ch-tower-capture-radius=塔接受来自镜子的阳光的最大距离。建议使用奇数。默认 45
ch-fluid-temp-per-mirror=每个镜子贡献的太阳能强度。默认 4.26
ch-laser-dmg-modifier=每次激光射击的伤害倍数。较高的值增加致命性。默认 5
ch-laser-max-range=设置最远交战距离。增加可扩大覆盖范围，减少可创建更紧密的防御周界。默认 150
ch-laser-min-range=定义最近交战距离。在塔旁边直接创建防御盲点。默认 6


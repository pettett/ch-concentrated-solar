[mod-setting-description]
ch-enable-beams=顯示鏡子和塔之間的視覺光束。可能需要最多60秒才能更新。
ch-solar-max-production-mw=單個塔在滿負荷時的最大加熱功率輸出。預設 600
ch-solar-max-temp=塔可達到的最大太陽能強度。預設 3650
ch-tower-capture-radius=塔接受來自鏡子的陽光的最大距離。建議使用奇數。預設 45
ch-fluid-temp-per-mirror=每個鏡子貢獻的太陽能強度。預設 4.26
ch-laser-dmg-modifier=每次雷射射擊的傷害倍數。較高的值增加致命性。預設 5
ch-laser-max-range=設置最遠交戰距離。增加可擴大覆蓋範圍，減少可創建更緊密的防禦周界。預設 150
ch-laser-min-range=定義最近交戰距離。在塔旁邊直接創建防禦盲點。預設 6


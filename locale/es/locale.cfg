[mod-setting-description]
ch-enable-beams=Muestra rayos visuales entre espejos y torres. Puede tardar hasta 60 segundos en actualizarse.
ch-solar-max-production-mw=Potencia térmica máxima producida por torre a plena capacidad. Predeterminado 600
ch-solar-max-temp=Intensidad solar máxima alcanzable por una torre. Predeterminado 3650
ch-tower-capture-radius=Distancia máxima a la que una torre acepta luz solar de los espejos. Se recomiendan números impares. Predeterminado 45
ch-fluid-temp-per-mirror=Intensidad solar aportada por espejo. Predeterminado 4.26
ch-laser-dmg-modifier=Multiplicador de daño por disparo láser. Valores más altos aumentan la letalidad. Predeterminado 5
ch-laser-max-range=Establece la distancia de enfrentamiento máxima. Aumentar extiende la cobertura, disminuir crea perímetros defensivos más ajustados. Predeterminado 150
ch-laser-min-range=Define la distancia de enfrentamiento mínima. Crea un punto ciego defensivo directamente adyacente a la torre. Predeterminado 6

